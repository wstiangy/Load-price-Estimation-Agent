services:
  - name: ieee14-lmp-agent
    type: web
    runtime: python
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn lmp_agent.dashboard:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
